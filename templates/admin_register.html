<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration | Resume Matcher</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .admin-login-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            padding-bottom: 80px;
        }

        .admin-login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success);
            border-radius: 50px;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .admin-login-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            color: white;
        }

        .admin-login-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-color);
            font-size: 1rem;
            margin-top: 8px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .admin-login-input:focus {
            border-color: var(--success);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .success-msg {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>

<body>
    <div class="admin-login-wrap">
        <div class="admin-login-card">
            <div style="text-align:center; margin-bottom: 28px;">
                <div class="admin-login-icon">📝</div>
                <div class="admin-badge">Admin Registration</div>
                <h2 style="margin: 0; font-size: 1.6rem;">Register Admin</h2>
                <p style="color: var(--text-muted); margin-top: 8px; font-size: 0.9rem;">Create a new admin account</p>
            </div>

            {% if error %}
            <div class="error-msg">⚠️ {{ error }}</div>
            {% endif %}

            <form method="POST" action="/admin/register">
                <div style="margin-bottom: 20px;">
                    <label
                        style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Username</label>
                    <input type="text" name="username" class="admin-login-input" placeholder="Choose a username"
                        autofocus required>
                </div>
                <div style="margin-bottom: 20px;">
                    <label
                        style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Password</label>
                    <input type="password" name="password" class="admin-login-input" placeholder="Choose a password"
                        required>
                </div>
                <div style="margin-bottom: 24px;">
                    <label
                        style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Confirm
                        Password</label>
                    <input type="password" name="confirm_password" class="admin-login-input"
                        placeholder="Re-enter your password" required>
                </div>
                <button type="submit" class="btn-primary btn-success"
                    style="width: 100%; padding: 14px; font-size: 1rem;">
                    📝 &nbsp;Register Account
                </button>
            </form>

            <div style="text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-muted);">
                Already have an account? <a href="/admin/login"
                    style="color: var(--primary); font-weight: 600; text-decoration: none;">Login here</a>
            </div>

            <div style="text-align: center; margin-top: 24px;">
                <a href="/" style="color: var(--text-muted); font-size: 0.85rem; text-decoration: none;">← Back to
                    App</a>
            </div>
        </div>
    </div>
</body>

</html>
