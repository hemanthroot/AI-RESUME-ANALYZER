<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Resume Matcher</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .admin-login-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .admin-login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: var(--primary);
            border-radius: 50px;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .admin-login-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary) 0%, #6d28d9 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
        }

        .admin-login-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-color);
            font-size: 1rem;
            margin-top: 8px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .admin-login-input:focus {
            border-color: var(--primary);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="admin-login-wrap">
        <div class="admin-login-card">
            <div style="text-align:center; margin-bottom: 28px;">
                <div class="admin-login-icon">🛡️</div>
                <div class="admin-badge">🔒 Admin Access</div>
                <h2 style="margin: 0; font-size: 1.6rem;">Admin Login</h2>
                <p style="color: var(--text-muted); margin-top: 8px; font-size: 0.9rem;">Enter the admin password to
                    continue</p>
            </div>

            {% if error %}
            <div class="error-msg">⚠️ {{ error }}</div>
            {% endif %}

            {% if success %}
            <div
                style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: var(--success); border-radius: 10px; padding: 12px 16px; font-size: 0.9rem; margin-bottom: 20px;">
                ✅ {{ success }}
            </div>
            {% endif %}

            <form method="POST" action="/admin/login">
                <div style="margin-bottom: 20px;">
                    <label
                        style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Username</label>
                    <input type="text" name="username" class="admin-login-input" placeholder="Enter admin username"
                        autofocus required>
                </div>
                <div style="margin-bottom: 20px;">
                    <label
                        style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Password</label>
                    <input type="password" name="password" class="admin-login-input" placeholder="Enter admin password"
                        required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; padding: 14px; font-size: 1rem;">
                    🛡️ &nbsp;Access Admin Panel
                </button>
            </form>

            <div style="text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-muted);">
                Need an account? <a href="/admin/register"
                    style="color: var(--primary); font-weight: 600; text-decoration: none;">Register here</a>
            </div>

            <div style="text-align: center; margin-top: 24px;">
                <a href="/" style="color: var(--text-muted); font-size: 0.85rem; text-decoration: none;">← Back to
                    App</a>
            </div>
        </div>
    </div>
</body>

</html>
