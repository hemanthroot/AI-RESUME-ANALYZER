<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Name | Resume Matcher</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container"
        style="min-height: 100vh; display: flex; align-items: center; justify-content: center; margin-top: 0;">
        <div class="card" style="text-align: center; max-width: 400px; width: 100%; padding: 40px 20px;">
            <div style="margin-bottom: 20px;">
                <svg width="48" height="48" fill="none" stroke="var(--primary)" stroke-width="1.5" viewBox="0 0 24 24"
                    style="margin: 0 auto; display: block;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                    </path>
                </svg>
            </div>
            <h2 style="margin-bottom: 10px; font-size: 1.5rem;">View Profile</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem;">Please enter your name to view
                this candidate's profile.</p>

            <form method="POST">
                <div class="form-group" style="text-align: left;">
                    <label for="viewer_name">Your Name</label>
                    <input type="text" id="viewer_name" name="viewer_name" placeholder="e.g., Jane Smith" required
                        style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: rgba(255, 255, 255, 0.03); color: var(--text-color); font-family: inherit; font-size: 1rem;">
                </div>
                <button type="submit" class="submit-btn" style="width: 100%; margin-top: 10px;">
                    Continue to Profile
                </button>
            </form>
        </div>
    </div>
</body>

</html>
